    function makeCard(r) {
      const typeClass = r.type.toLowerCase().includes('account') ? 'Account' :
                        r.type.toLowerCase().includes('tournament') ? 'Tournament' : 'Boost';
      let info = `<strong>${r.detail}</strong>`;
      if (r.mode) info += ` &bull; ${r.mode}`;
      if (r.method) info += ` &bull; ${r.method}`;
      return `
        <div class="review-card">
          <div class="review-header">
            <span class="review-user">${r.user}</span>
            <span class="review-stars">★★★★★</span>
          </div>
          <div class="review-type">${typeClass}</div>
          <div class="review-detail">${info}</div>
          <div class="review-date">Completed ${r.date}, 2026</div>
        </div>
      `;
    }

    // Split reviews into 2 rows
    const half = Math.ceil(reviews.length / 2);
    const row1 = reviews.slice(0, half);
    const row2 = reviews.slice(half);

    // Duplicate for seamless scroll
    const track1 = document.getElementById('track1');
    const track2 = document.getElementById('track2');

    track1.innerHTML = row1.map(makeCard).join('') + row1.map(makeCard).join('');
    track2.innerHTML = row2.map(makeCard).join('') + row2.map(makeCard).join('');
